<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Caseirão - Premium Delivery</title>
    <style>
        :root {
            --primary: #f39c12;
            --secondary: #2c3e50;
            --bg: #1a1a1a;
            --text-main: #ecf0f1;
            --text-dark: #333;
            --success: #27ae60;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            padding-bottom: 120px; 
            background-image: url('https://www.transparenttextures.com/patterns/black-linen.png');
        }

        header {
            background-color: #000;
            color: var(--text-main);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 4px solid var(--primary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        header h1 { font-size: 2.2rem; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        header p { color: var(--primary); font-size: 1.1rem; font-weight: 600; margin-top: 5px; }

        .container { max-width: 650px; margin: auto; padding: 20px; }

        .category-title { 
            margin: 35px 0 20px; font-size: 1.2rem; color: var(--primary); 
            text-transform: uppercase; font-weight: 700; display: flex; align-items: center; gap: 10px;
        }
        
        .category-title::after { content: ''; flex: 1; height: 2px; background: rgba(243, 156, 18, 0.3); }

        .product-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 15px; padding: 20px; margin-bottom: 15px;
            display: flex; flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .product-main { display: flex; justify-content: space-between; align-items: center; width: 100%; }

        .product-info { flex: 1; padding-right: 15px; }
        .product-info h3 { font-size: 1.15rem; color: #fff; font-weight: 600; }
        .product-info p { font-size: 0.85rem; color: #aaa; margin: 6px 0 10px 0; line-height: 1.4; }
        .price { color: var(--primary); font-weight: 700; font-size: 1.25rem; }

        .obs-container { margin-top: 15px; width: 100%; display: none; }
        .obs-input { 
            width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 8px; padding: 10px; color: white; font-size: 0.85rem; outline: none;
        }

        .add-initial { background: var(--primary); color: #000; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; }

        .qty-controls { display: flex; align-items: center; gap: 15px; background: rgba(255, 255, 255, 0.1); padding: 8px 12px; border-radius: 10px; }
        .btn-qty { background: var(--primary); color: #000; border: none; width: 35px; height: 35px; border-radius: 8px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .cart-footer {
            position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95);
            color: #fff; padding: 25px 30px; display: flex; justify-content: space-between;
            align-items: center; z-index: 999; cursor: pointer; border-top: 4px solid var(--primary); backdrop-filter: blur(10px);
        }

        #modal-cart { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; color: var(--text-dark); padding: 30px; width: 95%; max-width: 550px; border-radius: 20px; max-height: 85vh; overflow-y: auto; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; padding: 14px; border: 2px solid #ddd; border-radius: 10px; font-size: 1rem; }
        .checkout-btn { background: var(--success); color: white; width: 100%; padding: 18px; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: 700; cursor: pointer; margin-top: 20px; }
        .close-btn { color: #e74c3c; float: right; font-weight: 700; cursor: pointer; border: 1px solid #e74c3c; padding: 5px 10px; border-radius: 8px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <h1>O Caseirão</h1>
    <p>Premium Burgers & Espetos</p>
</header>

<div class="container">
    <h2 class="category-title">🍔 Burgers Individuais</h2>
    <div id="burgers-list"></div>

    <h2 class="category-title">🍟 Batatas Fritas</h2>
    <div id="fries-list"></div>

    <h2 class="category-title">🎁 Combos Promocionais</h2>
    <div id="combos-list"></div>

    <h2 class="category-title">🥤 Bebidas</h2>
    <div id="drinks-list"></div>
</div>

<div class="cart-footer" onclick="toggleModal()">
    <span style="font-weight:700;">🛒 Ver Pedido (<span id="cart-count">0</span>)</span>
    <span id="cart-total" style="font-weight:800; color:var(--primary)">R$ 0,00</span>
</div>

<div id="modal-cart">
    <div class="modal-content">
        <span class="close-btn" onclick="toggleModal()">FECHAR X</span>
        <h2 style="margin-bottom:25px; font-weight:800;">📋 Resumo do Pedido</h2>
        <div id="cart-review" style="margin-bottom: 25px;"></div>

        <div class="form-group">
            <label>👤 Seu Nome:</label>
            <input type="text" id="cust-name">
        </div>
        <div class="form-group">
            <label>🛵 Tipo de Pedido:</label>
            <select id="order-type" onchange="handleOrderTypeChange()">
                <option value="Entrega">Entrega (Delivery)</option>
                <option value="Retirada">Retirada no Local</option>
            </select>
        </div>

        <div id="delivery-fields">
            <div class="form-group">
                <label>🏙️ Seu Bairro (Taxa de Entrega):</label>
                <select id="cust-neighborhood" onchange="updateTotals()">
                    <option value="0" data-nome="Selecione um bairro">Selecione seu bairro...</option>
                    <option value="5" data-nome="Flores">Flores - R$ 5,00</option>
                    <option value="5" data-nome="Santa Rita">Santa Rita - R$ 5,00</option>
                    <option value="5" data-nome="Flor do campo">Flor do campo - R$ 5,00</option>
                    <option value="5" data-nome="Everest">Everest - R$ 5,00</option>
                    <option value="8" data-nome="Porção">Porção - R$ 8,00</option>
                    <option value="5" data-nome="Centro">Centro - R$ 5,00</option>
                    <option value="5" data-nome="Matador">Matador - R$ 5,00</option>
                    <option value="5" data-nome="Carri">Carri - R$ 5,00</option>
                    <option value="6" data-nome="Cidade nova">Cidade nova - R$ 6,00</option>
                    <option value="6" data-nome="Estação">Estação - R$ 6,00</option>
                    <option value="7" data-nome="Fripisa">Fripisa - R$ 7,00</option>
                    <option value="7" data-nome="Portal dos carnaúbais">Portal dos carnaúbais - R$ 7,00</option>
                    <option value="6" data-nome="São Luís">São Luís - R$ 6,00</option>
                    <option value="10" data-nome="Galileia">Galileia - R$ 10,00</option>
                    <option value="6" data-nome="Bairro de Fátima">Bairro de Fátima - R$ 6,00</option>
                    <option value="7" data-nome="Pousada do Sol">Pousada do Sol - R$ 7,00</option>
                    <option value="6" data-nome="Renascer">Renascer - R$ 6,00</option>
                </select>
            </div>
            <div class="form-group">
                <label>🏠 Endereço Completo:</label>
                <input type="text" id="cust-address" placeholder="Rua, Número e Referência">
            </div>
        </div>

        <div class="form-group">
            <label>💳 Pagamento:</label>
            <select id="cust-payment" onchange="document.getElementById('change-field').style.display = this.value === 'Dinheiro' ? 'block' : 'none'">
                <option value="Pix">Pix</option>
                <option value="Cartão">Cartão</option>
                <option value="Dinheiro">Dinheiro</option>
            </select>
        </div>
        <div class="form-group" id="change-field" style="display:none;">
            <label>💵 Troco para quanto?</label>
            <input type="text" id="cust-change" placeholder="Ex: R$ 50,00">
        </div>
        <button class="checkout-btn" onclick="sendWhatsApp()">ENVIAR NO WHATSAPP 💬</button>
    </div>
</div>

<script>
    const menu = [
        // Burgers
        { id: 1, name: "Sujinho", desc: "Pão selado, carne, queijo, presunto, verduras e molho da casa.", price: 14.00, cat: "burger" },
        { id: 2, name: "Pé Pra Fora", desc: "Pão selado, carne, queijo, presunto, bacon, verduras e molho da casa.", price: 16.00, cat: "burger" },
        { id: 3, name: "Pobres", desc: "Pão selado, carne, cheddar, bacon, cebola caramelizada, verduras e molho da casa.", price: 18.00, cat: "burger" },
        { id: 4, name: "Brutinho", desc: "Pão, anéis de cebola, queijo coalho, cheddar, carne, verduras e molho picante.", price: 20.00, cat: "burger" },
        { id: 5, name: "Demorô", desc: "Pão selado, carne, queijo, cheddar, bacon, frango, ovo e molho da casa.", price: 22.00, cat: "burger" },
        { id: 6, name: "Molecão", desc: "Pão, carne, queijo, presunto, bacon, calabresa, cebola caramelizada e molho da casa.", price: 24.00, cat: "burger" },
        { id: 7, name: "Caseirão", desc: "Pão, carne, queijo, presunto, ovo, bacon, calabresa, batata palha, verduras e molho.", price: 27.00, cat: "burger" },
        { id: 8, name: "Podrão", desc: "Pão, 2 carnes, queijo, presunto, ovo, calabresa, frango, bacon, verduras e molho.", price: 30.00, cat: "burger" },
        { id: 9, name: "Mata Fome", desc: "Pão, 3 carnes, queijo duplo, presunto duplo, cheddar duplo, bacon, ovo duplo e molho.", price: 40.00, cat: "burger" },
        
        // Batatas
        { id: 10, name: "Batata P", desc: "Porção pequena crocante.", price: 12.00, cat: "fry" },
        { id: 11, name: "Batata G", desc: "Porção grande crocante.", price: 23.00, cat: "fry" },
        { id: 12, name: "Batata P recheada", desc: "Com cheddar e bacon.", price: 17.00, cat: "fry" },
        { id: 13, name: "Batata G recheada", desc: "Com cheddar e bacon.", price: 27.00, cat: "fry" },

        // Combos
        { id: 14, name: "Combo Pé Pra Fora", desc: "Lanche + Batata + Refrigerante Lata.", price: 26.00, cat: "combo" },
        { id: 15, name: "Combo Pobres", desc: "Lanche + Batata + Refrigerante Lata.", price: 28.00, cat: "combo" },
        { id: 16, name: "Combo Brutinho", desc: "Lanche + Batata + Refrigerante Lata.", price: 30.00, cat: "combo" },
        { id: 17, name: "Combo Demorô", desc: "Lanche + Batata + Refrigerante Lata.", price: 32.00, cat: "combo" },
        { id: 18, name: "Combo Molecão", desc: "Lanche + Batata + Refrigerante Lata.", price: 34.00, cat: "combo" },
        { id: 19, name: "Combo Caseirão", desc: "Lanche + Batata + Refrigerante Lata.", price: 37.00, cat: "combo" },
        { id: 20, name: "Combo Podrão", desc: "Lanche + Batata + Refrigerante Lata.", price: 40.00, cat: "combo" },
        { id: 21, name: "Combo Mata Fome", desc: "Lanche + Batata + Refrigerante Lata.", price: 50.00, cat: "combo" },

        // Bebidas
        { id: 22, name: "Coca Lata Normal", desc: "350ml", price: 6.00, cat: "drink" },
        { id: 23, name: "Coca Lata Zero", desc: "350ml", price: 6.00, cat: "drink" },
        { id: 24, name: "Fanta / Guaraná / Pepsi", desc: "Lata 350ml", price: 5.00, cat: "drink" },
        { id: 25, name: "Refrigerante 1 Litro", desc: "Guaraná / Pepsi / Coca", price: 10.00, cat: "drink" },
        { id: 26, name: "Suco de Maracujá", desc: "Copo 400ml - Natural", price: 7.00, cat: "drink" },
        { id: 27, name: "Suco Goiaba / Acerola", desc: "Copo 400ml", price: 6.00, cat: "drink" },
        { id: 28, name: "Água Mineral", desc: "Sem gás", price: 3.00, cat: "drink" }
    ];

    let cart = {};

    function renderMenu() {
        const sections = { burger: document.getElementById('burgers-list'), fry: document.getElementById('fries-list'), combo: document.getElementById('combos-list'), drink: document.getElementById('drinks-list') };
        menu.forEach(item => {
            sections[item.cat].innerHTML += `
                <div class="product-card" id="card-${item.id}">
                    <div class="product-main">
                        <div class="product-info"><h3>${item.name}</h3><p>${item.desc}</p><span class="price">R$ ${item.price.toFixed(2).replace('.',',')}</span></div>
                        <div id="item-ctrl-${item.id}"><button class="add-initial" onclick="changeQty(${item.id}, 1)">Adicionar</button></div>
                    </div>
                    <div class="obs-container" id="obs-cont-${item.id}">
                        <input type="text" class="obs-input" id="obs-${item.id}" placeholder="Alguma observação?">
                    </div>
                </div>`;
        });
    }

    function changeQty(id, delta) {
        if (!cart[id]) cart[id] = { ...menu.find(m => m.id === id), qty: 0 };
        cart[id].qty += delta;
        const container = document.getElementById(`item-ctrl-${id}`);
        const obsCont = document.getElementById(`obs-cont-${id}`);

        if (cart[id].qty <= 0) { 
            delete cart[id]; 
            container.innerHTML = `<button class="add-initial" onclick="changeQty(${id}, 1)">Adicionar</button>`; 
            obsCont.style.display = "none";
        }
        else { 
            container.innerHTML = `<div class="qty-controls"><button class="btn-qty" onclick="changeQty(${id}, -1)">-</button><span style="font-weight:bold; color:#fff">${cart[id].qty}</span><button class="btn-qty" onclick="changeQty(${id}, 1)">+</button></div>`; 
            obsCont.style.display = "block";
        }
        updateTotals();
    }

    function handleOrderTypeChange() {
        const type = document.getElementById('order-type').value;
        document.getElementById('delivery-fields').style.display = type === 'Entrega' ? 'block' : 'none';
        updateTotals();
    }

    function updateTotals() {
        let itemsCount = 0; let itemsTotal = 0;
        for (let id in cart) { itemsCount += cart[id].qty; itemsTotal += cart[id].qty * cart[id].price; }
        let deliveryFee = 0;
        if (document.getElementById('order-type').value === 'Entrega') { deliveryFee = parseFloat(document.getElementById('cust-neighborhood').value) || 0; }
        const grandTotal = itemsTotal + deliveryFee;
        document.getElementById('cart-count').innerText = itemsCount;
        document.getElementById('cart-total').innerText = `R$ ${grandTotal.toFixed(2).replace('.',',')}`;
        return { itemsTotal, deliveryFee, grandTotal };
    }

    function toggleModal() {
        const modal = document.getElementById('modal-cart');
        if (modal.style.display === 'flex') modal.style.display = 'none';
        else {
            if (Object.keys(cart).length === 0) return alert("Carrinho vazio!");
            modal.style.display = 'flex';
            let html = "";
            for (let id in cart) { 
                let obsText = document.getElementById(`obs-${id}`).value;
                let obsDisplay = obsText ? `<br><small style="color:#666">Obs: ${obsText}</small>` : "";
                html += `<div style="display:flex; justify-content:space-between; margin-bottom:12px;"><span><strong>${cart[id].qty}x</strong> ${cart[id].name}${obsDisplay}</span><span style="font-weight:600;">R$ ${(cart[id].qty * cart[id].price).toFixed(2).replace('.',',')}</span></div>`; 
            }
            document.getElementById('cart-review').innerHTML = html;
        }
    }

    function sendWhatsApp() {
        const name = document.getElementById('cust-name').value;
        const type = document.getElementById('order-type').value;
        const neighborhoodSelect = document.getElementById('cust-neighborhood');
        const neighborhoodName = neighborhoodSelect.options[neighborhoodSelect.selectedIndex].getAttribute('data-nome');
        const addr = document.getElementById('cust-address').value;
        const pay = document.getElementById('cust-payment').value;
        const change = document.getElementById('cust-change').value;
        const totals = updateTotals();

        if(!name) return alert("Informe seu nome.");
        if(type === 'Entrega' && (totals.deliveryFee === 0 && neighborhoodSelect.value === "0")) return alert("Escolha um bairro.");

        let msg = `*NOVO PEDIDO - O CASEIRÃO* 🍔%0A%0A`;
        msg += `*Cliente:* ${name}%0A*Tipo:* ${type}%0A`;
        if(type === 'Entrega') {
            msg += `*Bairro:* ${neighborhoodName}%0A*Endereço:* ${addr}%0A*Taxa:* R$ ${totals.deliveryFee.toFixed(2).replace('.',',')}%0A`;
        }
        msg += `*Pagamento:* ${pay}%0A`;
        if(pay === 'Dinheiro') msg += `*Troco para:* ${change}%0A`;
        msg += `%0A*--- ITENS ---*%0A`;
        for (let id in cart) { 
            let obsText = document.getElementById(`obs-${id}`).value;
            msg += `• ${cart[id].qty}x ${cart[id].name}${obsText ? ' (Obs: ' + obsText + ')' : ''}%0A`; 
        }
        msg += `%0A*TOTAL FINAL: R$ ${totals.grandTotal.toFixed(2).replace('.',',')}*`;
        window.open(`https://api.whatsapp.com/send?phone=5586995653888&text=${msg}`);
    }
    renderMenu();
</script>
</body>
</html>
